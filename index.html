<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <title>IP Address Tracker</title>
  </head>

  <body>
    <div class="top-section">
      <div class="header">
        <h4>Ip Address Tracker</h4>
        <form action="return false;">
          <input
            type="text"
            name="search"
            id="search"
            placeholder="Search for any IP address or domain"
          />
          <button type="submit">
            <img src="images/icon-arrow.svg" alt="Search" />
          </button>
        </form>
      </div>

      <div class="info-box">
        <div class="info-col">
          <p class="label">IP Address</p>
          <p class="value" id="ip-display">--</p>
        </div>
        <div class="info-col">
          <p class="label">Location</p>
          <p class="value" id="location-display">--</p>
        </div>
        <div class="info-col">
          <p class="label">Timezone</p>
          <p class="value" id="timezone-display">--</p>
        </div>
        <div class="info-col">
          <p class="label">ISP</p>
          <p class="value" id="isp-display">--</p>
        </div>
      </div>
    </div>

    <div class="map-section">
      <div id="map"></div>
    </div>

    <script src="/main.js"></script>
  </body>
</html>
